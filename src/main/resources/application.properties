spring.application.name=campus-complaint-system

# Database connection details with H2 fallback for local testing
spring.datasource.url=${DB_URL:jdbc:h2:mem:complaint_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret with a default key (must be at least 256 bits for HS256)
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLXdpdGgtZW5vdWdoLWxlbmd0aA==}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary image storage with fallback demo values
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:secret}

server.port=8080